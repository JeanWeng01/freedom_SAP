# Credentials are loaded from .env file (SAP_URL, SAP_USERNAME, SAP_PASSWORD)

browser: "edge"                  # "edge" or "chrome"
excel_path: "../SAP_bot.xlsx"    # relative to sap_bot/ folder, or absolute path

autonomous_interval_minutes: 120 # how often tiles 1 & 2 auto-run. Currently 120min = every 2 hours
dry_run: false                    # SAFETY: if true, bot navigates but never clicks Submit/Confirm/Report

# Step-through mode: pause before every destructive action (tiles 3 & 4)
step_through: false

# Screenshot settings
screenshot_on_action: false       # take screenshot before/after destructive actions
screenshot_on_error: true        # take screenshot on any error
